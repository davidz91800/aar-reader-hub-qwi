<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AAR_Reader_QWI</title>
  <meta name="description" content="Consultation et edition des After Action Reviews pour QWI.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="AAR_Reader_QWI">
  <link rel="manifest" href="./manifest.webmanifest?v=20260318b">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png?v=20260318b">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png?v=20260318b">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png?v=20260318b">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=20260318d">
</head>
<body>

  <!-- HEADER -->
  <header id="app-header">
    <div class="header-left">
      <div class="logo-mark">
        <img src="./Logo%20QWI.png" alt="Logo QWI">
      </div>
      <div class="header-text">
        <h1>RETEX <span class="title-accent">Hub QWI</span></h1>
      </div>
    </div>
    <div class="header-actions">
      <button id="qwi-drive-btn" class="btn-icon btn-qwi-drive" title="Connexion Google Drive">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 19h11a4 4 0 0 0 0-8 5 5 0 0 0-9.7-1.5A3.5 3.5 0 0 0 6 19z"></path>
        </svg>
      </button>
      <button id="qwi-new-btn" class="btn-icon btn-qwi-new" title="Ajouter un AAR">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <button id="sync-btn" class="btn-icon" title="Synchroniser les donnees">
        <svg class="icon-sync" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
      <div class="view-toggle" id="view-toggle">
        <button class="toggle-btn active" data-view="list" title="Consultation">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </button>
        <button class="toggle-btn" data-view="analyze" title="Analyse globale">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </button>
        <button class="toggle-btn" data-view="admin" title="Administration QWI">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.2a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.2a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3h.1a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.2a1.6 1.6 0 0 0 1 1.5h.1a1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8v.1a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.2a1.6 1.6 0 0 0-1.5 1z"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- FILTERS BAR -->
  <section id="filters-bar" class="filters-bar">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" type="search" placeholder="Rechercher titre, redacteur, unite, analyse..." autocomplete="off">
    </div>
    <div class="filter-chips" id="filter-chips">
      <select id="filter-mission-type" class="chip-select" title="Type de mission">
        <option value="ALL">Mission: Tous</option>
        <option value="LOG">LOG</option>
        <option value="TAC">TAC</option>
      </select>
      <select id="filter-report-kind" class="chip-select" title="Type d'AAR">
        <option value="ALL">Format: Tous</option>
        <option value="FLASH">AAR FLASH</option>
        <option value="CONSOLIDE">AAR CONSOLIDE</option>
      </select>
      <select id="filter-classif" class="chip-select" title="Classification">
        <option value="ALL">Classif: Tous</option>
        <option value="NON PROTEGE">NON PROTEGE</option>
        <option value="DIFFUSION RESTREINTE">DIFFUSION RESTREINTE</option>
        <option value="SECRET SPECIAL FRANCE">SECRET SPECIAL FRANCE</option>
      </select>
      <select id="filter-fleet" class="chip-select" title="Flotte">
        <option value="ALL">Flotte: Toutes</option>
      </select>
      <select id="filter-unit" class="chip-select" title="Unite">
        <option value="ALL">Unite: Toutes</option>
      </select>
      <select id="filter-country" class="chip-select" title="Pays">
        <option value="ALL">Pays: Tous</option>
      </select>
      <select id="filter-operation" class="chip-select" title="Operation / exercice">
        <option value="ALL">Operation / exercice: Tous</option>
      </select>
      <select id="filter-hashtag" class="chip-select" title="Hashtag">
        <option value="ALL">Hashtag: Tous</option>
      </select>
      <select id="filter-sort" class="chip-select" title="Tri">
        <option value="DATE_DESC">Date desc</option>
        <option value="DATE_ASC">Date asc</option>
        <option value="TITLE_ASC">Titre A-Z</option>
        <option value="UPDATED_DESC">Maj recente</option>
      </select>
    </div>
  </section>

  <!-- MAIN CONTENT -->
  <main id="main-content">
    <!-- LIST VIEW -->
    <section id="view-list" class="view active">
      <div id="aar-count" class="count-badge"></div>
      <div id="aar-grid" class="aar-grid"></div>
    </section>

    <!-- ANALYZE VIEW -->
    <section id="view-analyze" class="view"></section>

    <!-- ADMIN VIEW -->
    <section id="view-admin" class="view"></section>
  </main>

  <!-- DETAIL MODAL -->
  <div id="detail-overlay" class="detail-overlay">
    <div id="detail-sheet" class="detail-sheet">
      <header class="detail-header">
        <button id="detail-print" class="btn-icon btn-print" title="Imprimer en PDF">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 6 2 18 2 18 9"></polyline>
            <path d="M6 14H4a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-2"></path>
            <rect x="6" y="14" width="12" height="8"></rect>
          </svg>
        </button>
        <button id="detail-close" class="btn-icon" title="Fermer">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <h2 id="detail-title"></h2>
        <p id="detail-meta-line" class="subtitle"></p>
      </header>
      <div id="detail-body" class="detail-body"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script>
    (function clearLegacyHubCaches() {
      const appVersion = "20260318d";
      try {
        if (localStorage.getItem("aar_hub_qwi_ui_version") !== appVersion) {
          localStorage.setItem("aar_hub_qwi_ui_version", appVersion);
          if ("caches" in window) {
            caches.keys().then((keys) => {
              keys.filter((k) => /aar|hub|retex/i.test(k)).forEach((k) => caches.delete(k));
            });
          }
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then((regs) => {
              regs.forEach((reg) => {
                const scope = String(reg.scope || "");
                if (scope.includes("/aar-reader-hub-qwi/")) reg.unregister();
              });
            });
          }
        }
      } catch {}
    })();
  </script>
  <script src="./config.js?v=20260318d"></script>
  <script src="./app.js?v=20260318d"></script>
  <script src="./aar-pwa/mission-config.js?v=20260318d"></script>
  <script src="./qwi-mode.js?v=20260318d"></script>
</body>
</html>
